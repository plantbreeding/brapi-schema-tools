comparisonAPI: OpenApiCompare
html:
    title: Changelog
    linkCss: http://deepoove.com/swagger-diff/stylesheets/demo.css
    showAllChanges: false
json:
    prettyPrint: true
markdown:
    showChangedMetadata: true
ignoreMissingEndpoints:
    - /vendor/\S+
ignoreDepreciatedEndpoints: true
ignoreDescriptions: true
